<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Web3 Browser</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    font-family:Arial;
    overflow:hidden;
}

.topbar{
    display:flex;
    gap:10px;
    padding:10px;
    background:#181818;
    border-bottom:1px solid #333;
}

input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#222;
    color:white;
    font-size:16px;
    outline:none;
}

button{
    padding:14px 20px;
    border:none;
    border-radius:10px;
    background:#00aaff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

iframe{
    width:100%;
    height:calc(100vh - 70px);
    border:none;
    background:white;
}

.loading{
    position:absolute;
    top:80px;
    left:20px;
    color:white;
    z-index:999;
}

</style>
</head>

<body>

<div class="topbar">

<input
id="domain"
placeholder="Enter website or .crypto domain"
/>

<button onclick="openSite()">
Open
</button>

</div>

<div class="loading" id="status"></div>

<iframe id="viewer"></iframe>

<script type="module">

import Resolution from 'https://cdn.jsdelivr.net/npm/@unstoppabledomains/resolution/build/index.min.js'

const resolution = new Resolution({
    sourceConfig:{
        uns:{
            locations:{
                Layer1:{
                    url:"https://rpc.unstoppableapi.com"
                }
            }
        }
    }
})

window.openSite = async function(){

    const input =
    document.getElementById("domain").value.trim()

    const viewer =
    document.getElementById("viewer")

    const status =
    document.getElementById("status")

    if(!input) return

    status.innerHTML = "Loading..."

    try{

        // WEB3 DOMAINS
        if(
            input.endsWith(".crypto") ||
            input.endsWith(".x") ||
            input.endsWith(".wallet") ||
            input.endsWith(".nft")
        ){

            // resolve ipfs hash
            const cid =
            await resolution.ipfsHash(input)

            console.log("CID:", cid)

            // open via gateway
            const url =
            `https://gateway.ipfs.io/ipfs/${cid}`

            viewer.src = url

            status.innerHTML =
            "Web3 domain loaded"

        }

        // NORMAL WEBSITES
        else{

            let url = input

            if(
                !url.startsWith("http://") &&
                !url.startsWith("https://")
            ){
                url = "https://" + url
            }

            viewer.src = url

            status.innerHTML =
            "Website loaded"
        }

    }catch(err){

        console.log(err)

        status.innerHTML =
        "Failed to load domain"

        alert(
            "Domain not found or blocked by iframe"
        )
    }

}

</script>

</body>
</html>
